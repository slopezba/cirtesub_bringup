controller_manager:
  ros__parameters:
    update_rate: 50

    hardware_components_initial_state:
      inactive:
        - cirtesub_thrusters

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    thruster_test_controller:
      type: forward_command_controller/ForwardCommandController

    body_force_controller:
      type: cirtesub_controllers/BodyForceController

    body_velocity_controller:
      type: cirtesub_controllers/BodyVelocityController

    position_hold_controller:
      type: cirtesub_controllers/PositionHoldController

    stabilize_controller:
      type: cirtesub_controllers/StabilizeController

    depth_hold_controller:
      type: cirtesub_controllers/DepthHoldController

    alpha_left_forward_velocity_controller:
      type: forward_command_controller/ForwardCommandController

    alpha_right_forward_velocity_controller:
      type: forward_command_controller/ForwardCommandController

    alpha_left_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    alpha_right_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

thruster_test_controller:
  ros__parameters:
    joints:
      - cirtesub/Thruster_up_front
      - cirtesub/Thruster_up_back
      - cirtesub/Thruster_up_left
      - cirtesub/Thruster_up_right
      - cirtesub/Thruster_down_backleft
      - cirtesub/Thruster_down_backright
      - cirtesub/Thruster_down_frontleft
      - cirtesub/Thruster_down_frontright
    interface_name: effort

body_force_controller:
  ros__parameters:
    input_topic: /body_force/command
    debug.enabled: true

body_velocity_controller:
  ros__parameters:
    setpoint_topic: /body_velocity_controller/setpoint
    navigator_topic: /cirtesub/navigator/navigation
    feedforward_topic: /depth_hold_controller/feedforward
    body_force_controller_name: body_force_controller

    kp_x: 100.0
    ki_x: 50.0
    kd_x: 0.0
    antiwindup_x: 10.0

    kp_y: 100.0
    ki_y: 50.0
    kd_y: 0.0
    antiwindup_y: 10.0

    kp_z: 800.0
    ki_z: 400.0
    kd_z: 0.0
    antiwindup_z: 10.0

    kp_roll: 100.0
    ki_roll: 50.0
    kd_roll: 0.0
    antiwindup_roll: 10.0

    kp_pitch: 100.0
    ki_pitch: 50.0
    kd_pitch: 0.0
    antiwindup_pitch: 10.0

    kp_yaw: 15.0
    ki_yaw: 8.0
    kd_yaw: 0.0
    antiwindup_yaw: 10.0

position_hold_controller:
  ros__parameters:
    setpoint_topic: /position_hold_controller/setpoint
    feedforward_topic: /position_hold_controller/feedforward
    navigator_topic: /cirtesub/navigator/navigation
    body_velocity_controller_name: body_velocity_controller
    setpoint_frame_id: world_ned

    kp_x: 1.0
    ki_x: 0.0
    kd_x: 0.0
    antiwindup_x: 1.0

    kp_y: 1.0
    ki_y: 0.0
    kd_y: 0.0
    antiwindup_y: 1.0

    kp_z: 1.0
    ki_z: 0.0
    kd_z: 0.0
    antiwindup_z: 1.0

    kp_roll: 1.0
    ki_roll: 0.0
    kd_roll: 0.0
    antiwindup_roll: 1.0

    kp_pitch: 1.0
    ki_pitch: 0.0
    kd_pitch: 0.0
    antiwindup_pitch: 1.0

    kp_yaw: 1.0
    ki_yaw: 0.0
    kd_yaw: 0.0
    antiwindup_yaw: 1.0

    linear_feedforward_threshold: 0.001
    angular_feedforward_threshold: 0.001
    feedforward_timeout: 0.25

stabilize_controller:
  ros__parameters:
    feedforward_topic: /stabilize_controller/feedforward
    navigator_topic: /cirtesub/navigator/navigation
    body_force_controller_name: body_force_controller
    enable_roll_pitch_service_name: /stabilize_controller/enable_roll_pitch
    disable_roll_pitch_service_name: /stabilize_controller/disable_roll_pitch
    allow_roll_pitch: false
    feedforward_gain_x: 1.0
    feedforward_gain_y: 1.0
    feedforward_gain_z: 1.0
    feedforward_gain_roll: 1.0
    feedforward_gain_pitch: 1.0
    feedforward_gain_yaw: 1.0

    kp_roll: 50.0
    ki_roll: 40.0
    kd_roll: 40.0

    kp_pitch: 50.0
    ki_pitch: 40.0
    kd_pitch: 40.0

    kp_yaw: 10.0
    ki_yaw: 2.0
    kd_yaw: 6.0

    yaw_command_threshold: 0.001
    roll_command_threshold: 0.001
    pitch_command_threshold: 0.001

depth_hold_controller:
  ros__parameters:
    feedforward_topic: /depth_hold_controller/feedforward
    navigator_topic: /cirtesub/navigator/navigation
    setpoint_topic: /depth_hold_controller/set_point
    body_force_controller_name: body_force_controller
    enable_roll_pitch_service_name: /depth_hold_controller/enable_roll_pitch
    disable_roll_pitch_service_name: /depth_hold_controller/disable_roll_pitch
    allow_roll_pitch: false
    feedforward_gain_x: 1.0
    feedforward_gain_y: 1.0
    feedforward_gain_z: 1.0
    feedforward_gain_roll: 1.0
    feedforward_gain_pitch: 1.0
    feedforward_gain_yaw: 1.0

    kp_roll: 50.0
    ki_roll: 40.0
    kd_roll: 40.0

    kp_pitch: 50.0
    ki_pitch: 40.0
    kd_pitch: 40.0

    kp_yaw: 10.0
    ki_yaw: 2.0
    kd_yaw: 6.0

    kp_depth: 400.0
    ki_depth: 100.0
    kd_depth: 400.0

    command_threshold: 0.001
    depth_command_threshold: 0.001

alpha_left_forward_velocity_controller:
  ros__parameters:
    joints:
      - cirtesub/alpha_left/axis_a
      - cirtesub/alpha_left/axis_b
      - cirtesub/alpha_left/axis_c
      - cirtesub/alpha_left/axis_d
      - cirtesub/alpha_left/axis_e
    interface_name: velocity

alpha_right_forward_velocity_controller:
  ros__parameters:
    joints:
      - cirtesub/alpha_right/axis_a
      - cirtesub/alpha_right/axis_b
      - cirtesub/alpha_right/axis_c
      - cirtesub/alpha_right/axis_d
      - cirtesub/alpha_right/axis_e
    interface_name: velocity

alpha_left_joint_trajectory_controller:
  ros__parameters:
    joints:
      - cirtesub/alpha_left/axis_a
      - cirtesub/alpha_left/axis_b
      - cirtesub/alpha_left/axis_c
      - cirtesub/alpha_left/axis_d
      - cirtesub/alpha_left/axis_e
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 40.0
    command_publish_rate: 40.0
    allow_nonzero_velocity_at_trajectory_end: false
    interpolation_method: splines
    gains:
      cirtesub/alpha_left/axis_a:
        p: 0.5
        i: 0.0
        d: 0.0
        i_clamp_min: -1.0
        i_clamp_max: 1.0
        ff_velocity_scale: 1.0
      cirtesub/alpha_left/axis_b:
        p: 0.5
        i: 0.0
        d: 0.0
        i_clamp_min: -1.0
        i_clamp_max: 1.0
        ff_velocity_scale: 1.0
      cirtesub/alpha_left/axis_c:
        p: 0.5
        i: 0.0
        d: 0.0
        i_clamp_min: -1.0
        i_clamp_max: 1.0
        ff_velocity_scale: 1.0
      cirtesub/alpha_left/axis_d:
        p: 0.5
        i: 0.0
        d: 0.0
        i_clamp_min: -1.0
        i_clamp_max: 1.0
        ff_velocity_scale: 1.0
      cirtesub/alpha_left/axis_e:
        p: 0.5
        i: 0.0
        d: 0.0
        i_clamp_min: -1.0
        i_clamp_max: 1.0
        ff_velocity_scale: 1.0

alpha_right_joint_trajectory_controller:
  ros__parameters:
    joints:
      - cirtesub/alpha_right/axis_a
      - cirtesub/alpha_right/axis_b
      - cirtesub/alpha_right/axis_c
      - cirtesub/alpha_right/axis_d
      - cirtesub/alpha_right/axis_e
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 40.0
    command_publish_rate: 40.0
    allow_nonzero_velocity_at_trajectory_end: false
    interpolation_method: splines
    gains:
      cirtesub/alpha_right/axis_a:
        p: 0.5
        i: 0.0
        d: 0.0
        i_clamp_min: -1.0
        i_clamp_max: 1.0
        ff_velocity_scale: 1.0
      cirtesub/alpha_right/axis_b:
        p: 0.5
        i: 0.0
        d: 0.0
        i_clamp_min: -1.0
        i_clamp_max: 1.0
        ff_velocity_scale: 1.0
      cirtesub/alpha_right/axis_c:
        p: 0.5
        i: 0.0
        d: 0.0
        i_clamp_min: -1.0
        i_clamp_max: 1.0
        ff_velocity_scale: 1.0
      cirtesub/alpha_right/axis_d:
        p: 0.5
        i: 0.0
        d: 0.0
        i_clamp_min: -1.0
        i_clamp_max: 1.0
        ff_velocity_scale: 1.0
      cirtesub/alpha_right/axis_e:
        p: 0.5
        i: 0.0
        d: 0.0
        i_clamp_min: -1.0
        i_clamp_max: 1.0
        ff_velocity_scale: 1.0
